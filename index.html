<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalityPro by ycy</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3843/3843032.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .today-active { background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%) !important; color: white !important; font-weight: 900; border-radius: 50%; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transform: scale(1.1); }
        .calendar-day { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; position: relative; color: #475569; font-size: 11px; }
        .done-history::after { content: '⭐'; position: absolute; bottom: -2px; right: -2px; font-size: 8px; }
        .progress-ring { transition: stroke-dashoffset 0.3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .task-done { border: 2px solid #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; opacity: 0.6; }
        input[type=range] { -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
    </style>
</head>
<body class="pb-16">

    <div class="max-w-md mx-auto px-6 py-6">
        
        <header class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-black tracking-tighter italic text-white">
                    Vitality<span class="text-blue-500">PRO</span><span class="text-[10px] font-normal text-slate-500 not-italic ml-1">by ycy</span>
                </h1>
                <button onclick="toggleVoice()" id="voice-toggle" class="bg-slate-800 p-2 rounded-xl border border-slate-700 text-lg shadow-lg">🔊</button>
            </div>
            
            <div class="space-y-3">
                <button onclick="toggleGender()" id="gender-toggle" class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-700 to-blue-900 text-xs font-black text-white shadow-lg uppercase tracking-widest active:scale-95 transition-all">
                    切換模式 (目前:男性)
                </button>
                <div class="glass p-4 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest italic">⚡️ Pacing Control (秒/次)</span>
                        <span id="pacing-val" class="text-sm font-black text-blue-500">2.0s</span>
                    </div>
                    <input type="range" id="pacing-slider" min="2" max="5" step="0.5" value="2" class="w-full" oninput="updatePacing(this.value)">
                </div>
            </div>
        </header>

        <div class="bg-blue-900/20 border border-blue-500/20 rounded-2xl p-4 mb-6 text-center">
            <p class="text-xs font-bold text-blue-400 mb-1 tracking-widest uppercase italic">
                <span id="user-pronoun-header">你</span>今天的教練：<span id="coach-name-display">等待中</span>
            </p>
            <div class="w-full bg-slate-700 h-1 rounded-full overflow-hidden mt-2">
                <div id="task-progress-bar" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <section class="glass rounded-[1.5rem] p-4 shadow-2xl mb-8">
            <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center font-bold"></div>
        </section>

        <section class="bg-slate-800/50 rounded-[3rem] p-6 text-white shadow-2xl relative border border-slate-700/50 mb-8 text-center">
            <div id="hero-emoji" class="text-7xl mb-4 h-20 flex items-center justify-center">🦸‍♂️</div>
            <div class="flex flex-col items-center">
                <div class="relative mb-4">
                    <svg width="120" height="120">
                        <circle cx="60" cy="60" r="54" stroke="#1e293b" stroke-width="6" fill="transparent" />
                        <circle id="timer-progress" cx="60" cy="60" r="54" stroke="#3b82f6" stroke-width="6" fill="transparent" stroke-dasharray="340" stroke-dashoffset="0" stroke-linecap="round" class="progress-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="display-val" class="text-5xl font-black italic">--</span>
                    </div>
                </div>
                <h3 id="action-title" class="text-xl font-black mb-1 text-blue-500 uppercase">選取任務</h3>
                <div id="set-info" class="text-[10px] font-bold text-slate-500 mb-4 tracking-widest uppercase italic">3 Sets • 12 Reps</div>
                <div class="bg-slate-900/80 rounded-2xl p-4 w-full border border-slate-700 min-h-[60px] flex items-center justify-center">
                    <p id="action-guide" class="text-xs text-slate-400 leading-relaxed font-medium italic">「請點擊動作開始！」</p>
                </div>
            </div>
        </section>

        <div id="daily-task-list" class="space-y-3 mb-10"></div>
    </div>

    <div id="reward-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-xl">
        <div class="bg-slate-900 border border-blue-500/30 rounded-[3.5rem] p-10 text-center max-w-sm w-full">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-2xl font-black text-white mb-2">任務全達成！</h2>
            <p id="reward-desc" class="text-slate-500 text-sm font-bold uppercase"></p>
            <button onclick="closeModal()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl mt-6 shadow-xl">繼續變強</button>
        </div>
    </div>

    <script>
        let currentGender = 'male';
        let isVoiceOn = true;
        let workoutState = 'IDLE'; 
        let currentEx = null;
        let setCounter = 1;
        let repCounter = 0;
        let timerInterval;
        let sessionCompletedNames = [];
        let pacingSeconds = 2.0;

        // 英雄清單，使用函數動態生成 你/妳
        function getHeroConfig() {
            const u = (currentGender === 'male') ? '你' : '妳';
            return [
                { name: "美國隊長", emoji: "🛡️", start: `我能跟${u}耗上一整天！動起來！`, rest: "戰友，休息三十秒。" },
                { name: "鋼鐵人", emoji: "🚀", start: `我愛${u}三千次，給我推起來！`, rest: "冷卻一下，賈維斯在監控中。" },
                { name: "蜘蛛人", emoji: "🕷️", start: `能力越大責任越大！加油！`, rest: "休息一下，我守著！" },
                { name: "浩克", emoji: "👊", start: `浩克！打碎！脂肪！浩克喜歡強壯的${u}！`, rest: "浩克...要...冷靜。" },
                { name: "雷神索爾", emoji: "⚡", start: `感受力量！${u}值得擁有妙爾尼爾！`, rest: "喝口水，休息三十秒。" },
                { name: "黑寡婦", emoji: "🕷️", start: `沒什麼是永恆的，但肌肉是。開始。`, rest: "保持警覺，休息一下。" },
                { name: "驚奇隊長", emoji: "⭐", start: `更高更快更強！超越極限！`, rest: "別停下，我們還要衝向星際。" },
                { name: "緋紅女巫", emoji: "🔮", start: `${u}可以掌控這股能量！推起來！`, rest: "釋放壓力，專注呼吸。" },
                { name: "舒莉", emoji: "🐆", start: "瓦干達萬歲！用科學的力量鍛鍊！", rest: "檢查系統，休息三十秒。" },
                { name: "葛摩菈", emoji: "🗡️", start: `${u}是宇宙最強的戰士。開始。`, rest: "別軟弱。休息。" }
            ];
        }

        const schedule = {
            2: { name: "週二：胸背力量日", exercises: ["伏地挺身", "彈力繩划船", "彈力繩胸推"] },
            4: { name: "週四：下肢護膝日", exercises: ["負重深蹲", "彈力繩死硬舉", "勾腳尖蹬腿"] },
            6: { name: "週六：核心心肺日", exercises: ["核心棒式", "開合跳", "二頭/三頭組合"] },
            0: { name: "週日：全身大挑戰", exercises: ["伏地挺身", "負重深蹲", "彈力繩划船", "核心棒式"] }
        };

        const allExercises = {
            "伏地挺身": { type: "REP", goalSet: 3, goalRep: 12 },
            "核心棒式": { type: "TIME", goalSet: 3, goalTime: 40 },
            "負重深蹲": { type: "REP", goalSet: 3, goalRep: 12 },
            "開合跳": { type: "TIME", goalSet: 3, goalTime: 30 },
            "彈力繩划船": { type: "REP", goalSet: 3, goalRep: 12 },
            "彈力繩死硬舉": { type: "REP", goalSet: 3, goalRep: 12 },
            "二頭/三頭組合": { type: "REP", goalSet: 3, goalRep: 12 },
            "勾腳尖蹬腿": { type: "REP", goalSet: 3, goalRep: 15 },
            "彈力繩胸推": { type: "REP", goalSet: 3, goalRep: 12 }
        };

        function speak(text, callback) {
            if (!isVoiceOn) { if(callback) callback(); return; }
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            msg.rate = 1.0;
            const voices = window.speechSynthesis.getVoices().filter(v => v.lang.includes('zh'));
            if(voices.length > 0) msg.voice = voices[Math.floor(Math.random() * voices.length)];
            msg.onend = () => { if(callback) callback(); };
            window.speechSynthesis.speak(msg);
        }

        function updatePacing(val) {
            pacingSeconds = parseFloat(val);
            document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s";
            localStorage.setItem('vp_ycy_pacing', pacingSeconds);
        }

        function initApp() {
            const savedP = localStorage.getItem('vp_ycy_pacing');
            if(savedP) {
                pacingSeconds = parseFloat(savedP);
                document.getElementById('pacing-slider').value = pacingSeconds;
                document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s";
            }
            renderCalendar();
            renderDailyTasks();
            updateUIPronoun();
            window.speechSynthesis.getVoices(); // 預熱
        }

        function updateUIPronoun() {
            const u = (currentGender === 'male') ? '你' : '妳';
            document.getElementById('user-pronoun-header').innerText = u;
            document.getElementById('reward-desc').innerText = `${u}是真正的英雄！By ycy`;
        }

        function renderDailyTasks() {
            const today = new Date().getDay();
            const taskInfo = schedule[today] || { name: "今日修復日", exercises: [] };
            const listEl = document.getElementById('daily-task-list');
            listEl.innerHTML = '';
            
            taskInfo.exercises.forEach(name => {
                const isDone = sessionCompletedNames.includes(name);
                const btn = document.createElement('button');
                btn.className = `glass w-full p-5 rounded-[2rem] flex justify-between items-center px-8 transition-all ${isDone ? 'task-done' : 'active:scale-95'}`;
                btn.innerHTML = `<span class="font-black text-sm uppercase">${isDone ? '✅ ' : ''}${name}</span><span class="text-[9px] font-bold opacity-30">LEVEL 3</span>`;
                if (!isDone) btn.onclick = () => startExercise(name);
                listEl.appendChild(btn);
            });

            const total = taskInfo.exercises.length;
            if (total > 0) {
                const p = Math.round((sessionCompletedNames.length / total) * 100);
                document.getElementById('task-progress-bar').style.width = p + "%";
            }
        }

        function startExercise(name) {
            if(workoutState !== 'IDLE') return;
            const heroList = getHeroConfig();
            const hero = heroList[Math.floor(Math.random() * heroList.length)];
            
            document.getElementById('coach-name-display').innerText = hero.name;
            document.getElementById('hero-emoji').innerText = hero.emoji;
            currentEx = { ...allExercises[name], name: name, hero: hero };
            
            setCounter = 1;
            workoutState = 'INTRO';
            document.getElementById('action-title').innerText = name;
            document.getElementById('action-guide').innerText = hero.start;
            
            speak(hero.start, () => startSet());
        }

        function startSet() {
            workoutState = 'WORKING';
            repCounter = 0;
            document.getElementById('display-val').innerText = "0";
            speak(`第 ${setCounter} 組，開始！`, () => {
                if(currentEx.type === "REP") runRep();
                else runTime();
            });
        }

        function runRep() {
            if (repCounter < currentEx.goalRep) {
                repCounter++;
                document.getElementById('display-val').innerText = repCounter;
                speak(`${repCounter}`);
                timerInterval = setTimeout(runRep, pacingSeconds * 1000);
            } else {
                finishSet();
            }
        }

        function runTime() {
            let left = currentEx.goalTime;
            timerInterval = setInterval(() => {
                left--;
                document.getElementById('display-val').innerText = left;
                if(left <= 3 && left > 0) speak(`${left}`);
                if(left <= 0) { clearInterval(timerInterval); finishSet(); }
            }, 1000);
        }

        function finishSet() {
            if (setCounter < currentEx.goalSet) {
                workoutState = 'RESTING';
                let r = 30;
                document.getElementById('timer-progress').style.stroke = "#10b981";
                speak(currentEx.hero.rest);
                timerInterval = setInterval(() => {
                    r--; document.getElementById('display-val').innerText = r;
                    if(r <= 0) { clearInterval(timerInterval); setCounter++; startSet(); }
                }, 1000);
            } else {
                completeEx();
            }
        }

        function completeEx() {
            workoutState = 'IDLE';
            sessionCompletedNames.push(currentEx.name);
            renderDailyTasks();
            const count = (schedule[new Date().getDay()] || {exercises:[]}).exercises.length;
            if (sessionCompletedNames.length === count) saveFinal();
            else speak("完成！下一項任務！");
        }

        function saveFinal() {
            const h = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const d = new Date().toLocaleDateString();
            if(!h.includes(d)) {
                h.push(d); localStorage.setItem('workoutHistory', JSON.stringify(h));
                renderCalendar();
                document.getElementById('reward-modal').classList.remove('hidden');
                speak("今日所有課程圓滿達成！By ycy");
            }
        }

        function renderCalendar() {
            const now = new Date(); const h = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const container = document.getElementById('calendar-days'); container.innerHTML = '';
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for (let i = 0; i < first; i++) container.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = new Date(now.getFullYear(), now.getMonth(), d).toLocaleDateString();
                const isToday = ds === new Date().toLocaleDateString();
                container.innerHTML += `<div class="calendar-day ${isToday ? 'today-active' : ''} ${h.includes(ds) ? 'done-history' : ''}">${d}</div>`;
            }
        }

        function toggleVoice() { isVoiceOn = !isVoiceOn; document.getElementById('voice-toggle').innerText = isVoiceOn ? '🔊' : '🔇'; }
        
        function toggleGender() { 
            currentGender = currentGender === 'male' ? 'female' : 'male'; 
            document.getElementById('gender-toggle').innerText = `切換模式 (目前:${currentGender === 'male' ? '男' : '女'}性)`;
            sessionCompletedNames = []; 
            initApp(); 
        }

        function closeModal() { document.getElementById('reward-modal').classList.add('hidden'); }
        function clearHistory() { if(confirm("清除紀錄？")) { localStorage.clear(); location.reload(); } }

        window.onload = initApp;
    </script>
</body>
</html>
