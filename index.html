<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitalityPro by ycy</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3843/3843032.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* 今天的熱血光圈：橘紅漸層 */
        .today-active { 
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%) !important; 
            color: white !important; 
            font-weight: 900; 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); 
            transform: scale(1.1); 
            z-index: 10; 
        }

        .calendar-day { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; position: relative; color: #475569; font-size: 11px; }
        .done-history::after { content: '🔥'; position: absolute; bottom: -2px; right: -2px; font-size: 8px; }
        
        .progress-ring { transition: stroke-dashoffset 0.3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .task-done { border: 2px solid #10b981 !important; background-color: rgba(16, 185, 129, 0.1) !important; opacity: 0.6; }
        .task-done span { color: #10b981 !important; }
        
        /* 自定義節奏滑桿樣式 */
        input[type=range] { -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #ef4444; cursor: pointer; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(2px); } 75% { transform: translateX(-2px); } }
        .shaking { animation: shake 0.2s infinite; color: #ef4444 !important; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto px-6 py-6">
        
        <header class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-black tracking-tighter italic text-white">
                    Vitality<span class="text-red-500">PRO</span> 
                    <span class="text-[10px] font-normal text-slate-500 not-italic ml-1">by ycy</span>
                </h1>
                <button onclick="toggleVoice()" id="voice-toggle" class="bg-slate-800 p-2 rounded-xl border border-slate-700 text-xl shadow-lg">🔊</button>
            </div>
            
            <div class="space-y-3">
                <button onclick="toggleGender()" id="gender-toggle" class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-700 text-xs font-black text-white shadow-lg uppercase tracking-widest active:scale-95 transition-all">
                    切換至女性訓練模式
                </button>
                
                <div class="glass p-4 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">⚡️ 動作數數節奏 (秒/次)</span>
                        <span id="pacing-val" class="text-sm font-black text-red-500">2.0s</span>
                    </div>
                    <input type="range" id="pacing-slider" min="2" max="5" step="0.5" value="2" class="w-full" oninput="updatePacing(this.value)">
                </div>
            </div>
        </header>

        <div class="bg-slate-800/40 border border-slate-700 rounded-2xl p-4 mb-6">
            <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">
                <span id="task-summary">今日課程載入中...</span>
                <span id="task-percent">0%</span>
            </div>
            <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                <div id="task-progress-bar" class="bg-emerald-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <section class="glass rounded-[1.5rem] p-4 shadow-2xl mb-8">
            <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center font-bold"></div>
        </section>

        <section class="bg-slate-800/50 rounded-[3rem] p-6 text-white shadow-2xl relative border border-slate-700/50 mb-8 text-center">
            <div class="mb-4 flex justify-center">
                <img id="exercise-img" src="https://cdn-icons-png.flaticon.com/512/3843/3843032.png" class="w-full h-40 object-contain rounded-3xl bg-slate-900/50 p-4" alt="動作示範">
            </div>

            <div class="flex flex-col items-center">
                <div class="relative mb-4">
                    <svg width="140" height="140">
                        <circle cx="70" cy="70" r="62" stroke="#1e293b" stroke-width="8" fill="transparent" />
                        <circle id="timer-progress" cx="70" cy="70" r="62" stroke="#ef4444" stroke-width="8" fill="transparent" stroke-dasharray="390" stroke-dashoffset="0" stroke-linecap="round" class="progress-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="display-val" class="text-6xl font-black italic tracking-tighter">--</span>
                        <span id="display-label" class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Action</span>
                    </div>
                </div>

                <h3 id="action-title" class="text-xl font-black mb-1 text-red-500 uppercase">請選擇動作</h3>
                <div id="set-info" class="text-[10px] font-bold text-slate-500 mb-4 tracking-widest uppercase italic">3 Sets • 12 Reps per set</div>
                
                <div class="bg-slate-900/80 rounded-2xl p-4 w-full border border-slate-700">
                    <p id="action-guide" class="text-xs text-slate-400 leading-relaxed font-medium italic">
                        「速度慢才是肌肉增長的關鍵，泰森在看著你！」
                    </p>
                </div>
            </div>
        </section>

        <div id="daily-task-list" class="space-y-3 mb-10"></div>

        <div id="badge-row" class="flex justify-center gap-6 grayscale opacity-20 transition-all duration-1000">
            <div class="text-3xl">🥉</div><div class="text-3xl">🥈</div><div class="text-3xl">🥇</div>
        </div>
        
        <footer class="mt-12 text-center">
            <button onclick="clearHistory()" class="text-[9px] text-slate-600 underline uppercase tracking-widest font-bold">Reset VitalityPro Data</button>
            <p class="text-[8px] text-slate-700 mt-4 uppercase">VitalityPro ∙ Crafted by ycy ∙ 2026</p>
        </footer>
    </div>

    <div id="reward-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-xl">
        <div class="bg-slate-900 border border-red-500/30 rounded-[3.5rem] p-10 text-center max-w-sm w-full shadow-2xl">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-2xl font-black text-white mb-2 italic tracking-tighter">今日任務全部達成！</h2>
            <p id="reward-desc" class="text-slate-400 mb-8 leading-relaxed text-sm font-medium"></p>
            <button onclick="closeModal()" class="w-full bg-red-600 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95">繼續強大</button>
        </div>
    </div>

    <script>
        let currentGender = 'male';
        let isVoiceOn = true;
        let workoutState = 'IDLE'; 
        let currentEx = null;
        let setCounter = 1;
        let repCounter = 0;
        let timerInterval;
        let sessionCompletedNames = [];
        let pacingSeconds = 2.0;

        // --- 核心科學課表 (W2, 4, 6, Sun) ---
        const schedule = {
            2: { name: "週二：胸背力量日", exercises: ["伏地挺身", "彈力繩划船", "彈力繩胸推"] },
            4: { name: "週四：下肢護膝日", exercises: ["負重深蹲", "彈力繩死硬舉", "勾腳尖蹬腿"] },
            6: { name: "週六：核心心肺日", exercises: ["核心棒式", "開合跳", "二頭/三頭組合"] },
            0: { name: "週日：全身大挑戰", exercises: ["伏地挺身", "負重深蹲", "彈力繩划船", "核心棒式"] }
        };

        const allExercises = {
            "伏地挺身": { intro: "伏地挺身。三組十二下。每一推都要推向極限！", type: "REP", goalSet: 3, goalRep: 12, img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXJreW90bWxsbm9hZDNvNHRrMmdsZTR6bjZnd3ZscDR6NHZsayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKpxv42I89mQJLW/giphy.gif" },
            "核心棒式": { intro: "核心棒式。三組四十秒。鎖死核心，不准動！", type: "TIME", goalSet: 3, goalTime: 40, img: "https://media.giphy.com/media/3o7TKSj0q942H2e5tS/giphy.gif" },
            "負重深蹲": { intro: "負重深蹲。三組十二下。蹲下去，再像彈簧一樣站起！", type: "REP", goalSet: 3, goalRep: 12, img: "https://media.giphy.com/media/3o7TKv6eSqcE2C6Iyk/giphy.gif" },
            "開合跳": { intro: "開合跳。三組三十秒。讓靈魂跟著跳動！", type: "TIME", goalSet: 3, goalTime: 30, img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZhcHoxZ3Z0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKpxv42I89mQJLW/giphy.gif" },
            "彈力繩划船": { intro: "彈力繩划船。三組十二下。背肌夾緊，拉動命運！", type: "REP", goalSet: 3, goalRep: 12, img: "https://cdn-icons-png.flaticon.com/512/3843/3843015.png" },
            "彈力繩死硬舉": { intro: "彈力繩死硬舉。三組十二下。腳踩穩，向上站！", type: "REP", goalSet: 3, goalRep: 12, img: "https://cdn-icons-png.flaticon.com/512/3843/3843022.png" },
            "二頭/三頭組合": { intro: "手臂強化。三組十二下。打造鋼鐵雙臂！", type: "REP", goalSet: 3, goalRep: 12, img: "https://cdn-icons-png.flaticon.com/512/3843/3843032.png" },
            "勾腳尖蹬腿": { intro: "勾腳尖蹬腿。三組十五下。守護膝蓋的最後防線！", type: "REP", goalSet: 3, goalRep: 15, img: "https://cdn-icons-png.flaticon.com/512/3843/3843032.png" },
            "彈力繩胸推": { intro: "彈力繩胸推。三組十二下。穩定推進，撕裂胸肌！", type: "REP", goalSet: 3, goalRep: 12, img: "https://cdn-icons-png.flaticon.com/512/3843/3843015.png" }
        };

        function speak(t, callback) {
            if (!isVoiceOn) { if(callback) callback(); return; }
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'zh-TW'; m.rate = 1.0; m.pitch = 1.1;
            if(callback) m.onend = callback;
            window.speechSynthesis.speak(m);
        }

        function updatePacing(val) {
            pacingSeconds = parseFloat(val);
            document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s";
            localStorage.setItem('vp_pacing', pacingSeconds);
        }

        function initApp() {
            const savedP = localStorage.getItem('vp_pacing');
            if(savedP) {
                pacingSeconds = parseFloat(savedP);
                document.getElementById('pacing-slider').value = pacingSeconds;
                document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s";
            }
            renderCalendar();
            renderDailyTasks();
            updateBadges();
        }

        function renderDailyTasks() {
            const today = new Date().getDay();
            const taskInfo = schedule[today] || { name: "今日休息修復日", exercises: [] };
            document.getElementById('task-summary').innerText = taskInfo.name;
            const listEl = document.getElementById('daily-task-list');
            listEl.innerHTML = '';
            
            taskInfo.exercises.forEach(name => {
                const isDone = sessionCompletedNames.includes(name);
                const btn = document.createElement('button');
                btn.className = `glass w-full p-5 rounded-[2rem] flex justify-between items-center px-8 transition-all ${isDone ? 'task-done' : 'active:scale-95'}`;
                btn.innerHTML = `<span class="font-black text-sm">${isDone ? '✅ ' : ''}${name}</span><span class="text-[9px] font-bold opacity-30">3 SETS</span>`;
                if (!isDone) btn.onclick = () => startExercise(name);
                listEl.appendChild(btn);
            });

            const total = taskInfo.exercises.length;
            if (total > 0) {
                const p = Math.round((sessionCompletedNames.length / total) * 100);
                document.getElementById('task-percent').innerText = p + "%";
                document.getElementById('task-progress-bar').style.width = p + "%";
            }
        }

        function startExercise(name) {
            if(workoutState !== 'IDLE') return;
            currentEx = { ...allExercises[name], name: name };
            setCounter = 1;
            workoutState = 'INTRO';
            document.getElementById('action-title').innerText = name;
            document.getElementById('action-guide').innerText = currentEx.intro;
            document.getElementById('exercise-img').src = currentEx.img;
            speak(currentEx.intro, () => startSet());
        }

        function startSet() {
            workoutState = 'WORKING';
            repCounter = 0;
            document.getElementById('display-label').innerText = `SET ${setCounter}`;
            document.getElementById('timer-progress').style.stroke = "#ef4444";
            speak(`第 ${setCounter} 組，泰森看著你，開始！`, () => {
                if(currentEx.type === 'REP') runRepCycle();
                else runTimeCycle();
            });
        }

        function runRepCycle() {
            if (repCounter < currentEx.goalRep) {
                repCounter++;
                document.getElementById('display-val').innerText = repCounter;
                speak(`${repCounter}`);
                
                timerInterval = setTimeout(() => {
                    runRepCycle();
                }, pacingSeconds * 1000);
            } else {
                finishSet();
            }
        }

        function runTimeCycle() {
            let left = currentEx.goalTime;
            document.getElementById('display-val').innerText = left;
            timerInterval = setInterval(() => {
                left--;
                document.getElementById('display-val').innerText = left;
                document.getElementById('timer-progress').style.strokeDashoffset = 390 - (left/currentEx.goalTime)*390;
                if(left === 3) { document.getElementById('display-val').classList.add('shaking'); speak("三、二、一！撐住！"); }
                if(left <= 0) { 
                    clearInterval(timerInterval); 
                    document.getElementById('display-val').classList.remove('shaking');
                    finishSet(); 
                }
            }, 1000);
        }

        function finishSet() {
            if (setCounter < currentEx.goalSet) startRest();
            else completeExercise();
        }

        function startRest() {
            workoutState = 'RESTING';
            let r = 30;
            document.getElementById('display-label').innerText = "REST";
            document.getElementById('timer-progress').style.stroke = "#10b981";
            speak("漂亮！休息三十秒，深呼吸，喝口水。");
            timerInterval = setInterval(() => {
                r--; document.getElementById('display-val').innerText = r;
                if(r <= 3 && r > 0) speak(`${r}`);
                if(r <= 0) { clearInterval(timerInterval); setCounter++; startSet(); }
            }, 1000);
        }

        function completeExercise() {
            workoutState = 'IDLE';
            sessionCompletedNames.push(currentEx.name);
            renderDailyTasks();
            const todayTasks = (schedule[new Date().getDay()] || {exercises:[]}).exercises;
            if (sessionCompletedNames.length === todayTasks.length) saveFinal();
            else { 
                speak(`${currentEx.name}已擊破，下一項任務等著你！`); 
                document.getElementById('display-val').innerText = "✅"; 
            }
        }

        function saveFinal() {
            const h = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const d = new Date().toLocaleDateString();
            if(!h.includes(d)) {
                h.push(d); localStorage.setItem('workoutHistory', JSON.stringify(h));
                renderCalendar(); updateBadges();
                document.getElementById('reward-desc').innerText = "泰森說：你是真正的鬥士！今日課程圓滿達成！";
                document.getElementById('reward-modal').classList.remove('hidden');
                speak("全任務達成！你是真正的傳奇！");
            }
        }

        function renderCalendar() {
            const now = new Date(); const h = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const container = document.getElementById('calendar-days'); container.innerHTML = '';
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            for (let i = 0; i < first; i++) container.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = new Date(now.getFullYear(), now.getMonth(), d).toLocaleDateString();
                const isToday = ds === new Date().toLocaleDateString();
                container.innerHTML += `<div class="calendar-day ${isToday ? 'today-active' : ''} ${h.includes(ds) ? 'done-history' : ''}">${d}</div>`;
            }
        }

        function updateBadges() {
            const count = JSON.parse(localStorage.getItem('workoutHistory') || "[]").length;
            if(count >= 5) document.getElementById('badge-row').classList.remove('grayscale', 'opacity-20');
        }

        function toggleVoice() { isVoiceOn = !isVoiceOn; document.getElementById('voice-toggle').innerText = isVoiceOn ? '🔊' : '🔇'; }
        function toggleGender() { currentGender = currentGender==='male'?'female':'male'; document.getElementById('gender-toggle').innerText = `切換模式 (目前:${currentGender==='male'?'男':'女'}性)`; sessionCompletedNames = []; initApp(); }
        function closeModal() { document.getElementById('reward-modal').classList.add('hidden'); }
        function clearHistory() { if(confirm("確定清除 VitalityPro 所有歷史紀錄嗎？")) { localStorage.clear(); location.reload(); } }

        initApp();
    </script>
</body>
</html>
