<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitalityPro by ycy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f8fafc; -webkit-tap-highlight-color: transparent; transition: background 0.5s; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .theme-male { --main: #3b82f6; }
        .theme-female { --main: #f472b6; }
        .bg-main { background-color: var(--main); }
        .text-main { color: var(--main); }
        .border-main { border-color: var(--main); }
        
        /* 動作方塊狀態控制 */
        .task-card { border: 2px solid transparent; transition: all 0.3s ease; }
        .task-card.active-now { border-color: var(--main); box-shadow: 0 0 20px var(--main); transform: scale(1.02); background: rgba(255,255,255,0.05); }
        .task-card.completed { border-color: #10b981; background: rgba(16, 185, 129, 0.1) !important; opacity: 0.8; }
        
        .today-mark { background: #ef4444 !important; color: white !important; border-radius: 50%; font-weight: 900; }
        .workout-day { border: 2px solid var(--main); border-radius: 50%; }
        .calendar-day { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; position: relative; color: #475569; font-size: 14px; }
        .done-history::after { content: '⭐'; position: absolute; bottom: -2px; right: -2px; font-size: 10px; color: #f59e0b; }
        .progress-ring { transition: stroke-dashoffset 0.3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .day-btn { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid #334155; font-size: 13px; font-weight: 900; color: #475569; }
        .day-btn.active { background-color: var(--main); color: white; border-color: var(--main); }
        #entry-screen { position: fixed; inset: 0; z-index: 100; background: #0b1120; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; transition: opacity 0.8s ease; }
    </style>
</head>
<body class="pb-20 theme-male" id="app-body">

    <div id="entry-screen">
        <div class="max-w-xs w-full">
            <h1 class="text-5xl font-black tracking-tighter italic text-white mb-2">Vitality<span class="text-blue-500">PRO</span></h1>
            <p class="text-slate-500 text-base font-bold tracking-widest mb-16 uppercase">By ycy ∙ Elite Coaching</p>
            <button onclick="startApp()" class="w-full bg-blue-600 py-6 rounded-[2.5rem] text-white font-black text-xl shadow-2xl">開啟充滿活力的一天</button>
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 py-6" id="main-content">
        <header class="mb-8">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-black tracking-tighter italic text-white">Vitality<span class="text-main">PRO</span><span class="text-sm font-normal text-slate-500 not-italic ml-2">by ycy</span></h1>
                <button onclick="toggleVoice()" id="voice-toggle" class="bg-slate-800 p-3 rounded-xl border border-slate-700 text-2xl">🔊</button>
            </div>
            <button onclick="toggleGender()" id="gender-btn" class="w-full py-5 rounded-2xl bg-main text-base font-black text-white shadow-lg uppercase tracking-widest active:scale-95">切換模式 (目前:男性)</button>
        </header>

        <div class="glass p-6 rounded-[2.5rem] mb-8 border border-slate-700">
            <h4 class="text-sm font-black text-main uppercase tracking-widest mb-4 text-center italic">設定特訓日 (最多4天)</h4>
            <div class="flex justify-between mb-6">
                <button class="day-btn" data-day="1">一</button><button class="day-btn" data-day="2">二</button><button class="day-btn" data-day="3">三</button><button class="day-btn" data-day="4">四</button><button class="day-btn" data-day="5">五</button><button class="day-btn" data-day="6">六</button><button class="day-btn" data-day="0">日</button>
            </div>
            <div class="flex gap-4">
                <button onclick="confirmSchedule()" class="flex-1 bg-main py-4 rounded-2xl font-black text-xs text-white uppercase">確定設定</button>
                <button onclick="resetSchedule()" class="flex-1 bg-slate-800 py-4 rounded-2xl font-black text-xs text-slate-400 uppercase">重設</button>
            </div>
        </div>

        <div class="bg-slate-800/40 border border-slate-700 rounded-2xl p-6 mb-8 text-center">
            <h4 class="text-xs font-black text-main uppercase tracking-widest mb-2">今天的目標</h4>
            <p id="daily-goal-text" class="text-base text-slate-200 font-medium italic">請先完成上方排程</p>
        </div>

        <section class="glass rounded-[2rem] p-5 shadow-2xl mb-10 text-center">
            <div id="calendar-days" class="grid grid-cols-7 gap-2 font-bold"></div>
        </section>

        <section class="bg-slate-800/30 rounded-[3.5rem] p-10 text-white shadow-2xl relative border border-slate-700/50 mb-12 text-center">
            <p class="text-sm font-black text-main uppercase tracking-widest mb-4"><span class="coach-pronoun">你</span>今天的教練</p>
            <div class="flex justify-center mb-8">
                <div class="w-32 h-32 rounded-full border-4 border-slate-700 bg-slate-900 overflow-hidden shadow-2xl">
                    <img id="hero-img" src="https://i.postimg.cc/02dzjW8X/1775410232847.png" class="w-full h-full object-cover">
                </div>
            </div>
            <div class="flex flex-col items-center">
                <div class="relative mb-8">
                    <svg width="150" height="150">
                        <circle cx="75" cy="75" r="68" stroke="#1e293b" stroke-width="8" fill="transparent" />
                        <circle id="timer-progress" cx="75" cy="75" r="68" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="427" stroke-dashoffset="0" stroke-linecap="round" class="progress-ring text-main" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="display-val" class="text-7xl font-black italic tracking-tighter">--</span>
                    </div>
                </div>
                <h3 id="action-title" class="text-2xl font-black mb-2 text-white uppercase italic tracking-tighter">READY?</h3>
                <p id="action-coach-name" class="text-base text-slate-400 italic">選取下方動作開始</p>
            </div>
        </section>

        <div id="daily-task-list" class="space-y-8 mb-16"></div>

        <div class="glass p-6 rounded-3xl border border-slate-700 mb-12">
            <div class="flex justify-between items-center mb-3">
                <span class="text-sm font-black text-slate-400 uppercase tracking-widest italic">⚡️ 動作數數節奏 (秒/次)</span>
                <span id="pacing-val" class="text-xl font-black text-main">2.0s</span>
            </div>
            <input type="range" id="pacing-slider" min="2" max="5" step="0.5" value="2" class="w-full" oninput="updatePacing(this.value)">
        </div>

        <footer class="text-center py-10 border-t border-slate-800">
            <p class="text-sm text-slate-600 font-bold tracking-widest uppercase">VitalityPro | Elite Coaching | By ycy 2026</p>
        </footer>
    </div>

    <div id="reward-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-xl">
        <div class="bg-slate-900 border border-slate-700 rounded-[4rem] p-12 text-center max-w-sm w-full shadow-2xl">
            <div class="text-9xl mb-8">🏆</div>
            <h2 class="text-3xl font-black text-white mb-6 italic">特訓全達成！</h2>
            <p id="reward-msg" class="text-lg text-slate-300 mb-10 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-main text-white font-black py-5 rounded-2xl shadow-xl text-xl">明天更強</button>
        </div>
    </div>

    <script>
        let currentGender = 'male';
        let isVoiceOn = true;
        let workoutState = 'IDLE'; 
        let currentExName = null;
        let setCounter = 1;
        let repCounter = 0;
        let timerId = null;
        let pacingSeconds = 2.0;
        let sessionCompletedNames = [];
        let mySchedule = JSON.parse(localStorage.getItem('vSch_ycy_2026_final_v4')) || [];

        const heroes = {
            male: [
                { name: "美國隊長", img: "https://i.postimg.cc/02dzjW8X/1775410232847.png", msg: "我能跟你耗上一整天！動起來！" },
                { name: "鋼鐵人", img: "https://i.postimg.cc/2SbgTJVF/Screenshot-20260406-012721-Chrome.jpg", msg: "我愛你三千次，給我推起來！" },
                { name: "雷神索爾", img: "https://i.postimg.cc/ZKgM9cV8/1000046561.jpg", msg: "感受力量！你值得擁有雷神之槌！" },
                { name: "蜘蛛人", img: "https://i.postimg.cc/zDSps208/2f97an638ty71.png", msg: "能力越大責任越大！加油戰友！" },
                { name: "浩克", img: "https://i.postimg.cc/FRxcB8mT/e034a1aa5c1f786a5be9db40149ffe63.jpg", msg: "浩克！打碎脂肪！浩克喜歡強壯的你！" }
            ],
            female: [
                { name: "黑寡婦", img: "https://i.postimg.cc/TYb22mLS/580b57fbd9996e24bc43c01f.png", msg: "肌肉是永恆的，開始特訓！" },
                { name: "緋紅女巫", img: "https://i.postimg.cc/qBb6687z/pngtree-scarlet-witch-1980s-workout-outfit-comic-book-panel-white-background-png-image-17124607.jpg", msg: "妳可以掌控這股能量！推起來！" },
                { name: "驚奇隊長", img: "https://i.postimg.cc/Pr1L3043/162461510278.png", msg: "更高更快更強！超越妳的極限！" },
                { name: "舒莉", img: "https://i.postimg.cc/tCDb45CR/1775434457885.png", msg: "瓦干達萬歲！用科學的力量強化妳！" },
                { name: "葛摩菈", img: "https://i.postimg.cc/tT0QMvDh/1775434603033.png", msg: "妳是宇宙最強的戰士。不准軟弱！" }
            ]
        };

        const getExConfig = () => {
            const isM = currentGender === 'male';
            return {
                "伏地挺身": { sets: isM?3:2, reps: isM?12:8, tips: "與肩同寬，推起時吐氣，背部保持平直。" },
                "負重深蹲": { sets: 3, reps: isM?15:12, tips: "腳踩穩，屁股像坐椅子，膝蓋不超腳尖。" },
                "核心棒式": { sets: 3, reps: isM?40:30, tips: "全身呈一線，腹部收緊，不要憋氣。" },
                "彈力繩划船": { sets: isM?3:2, reps: isM?12:10, tips: "挺胸夾緊背部，帶子拉至腹部兩側。" },
                "彈力繩胸推": { sets: isM?3:2, reps: isM?12:10, tips: "雙手前推感受胸肌收縮，慢放快推。" },
                "勾腳尖蹬腿": { sets: 3, reps: 15, tips: "用力勾起腳尖，腿部完全伸直，保護膝蓋。" },
                "開合跳": { sets: 3, reps: isM?40:30, tips: "輕盈跳躍，利用腳尖緩衝，雙手過頭。" },
                "二頭/三頭組合": { sets: isM?3:2, reps: isM?12:10, tips: "固定手肘，感受手臂肌肉緩慢收縮。" }
            };
        };

        const encouragements = [
            "加油，你可以的！",
            "堅持下去，英雄就是這樣煉成的！",
            "做得好，朋友們，感受肌肉的力量！",
            "再堅持一下，成果就在眼前了！",
            "妳做得比想像中還要出色！",
            "為了更強大的明天，我們一起努力！"
        ];

        function speak(text) {
            if (!isVoiceOn) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
        }

        function startApp() {
            document.getElementById('entry-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('entry-screen').style.display = 'none', 800);
            speak("朋友們，歡迎回來，準備好今天的特訓了嗎？");
        }

        function resetAllTimers() {
            clearInterval(timerId);
            clearTimeout(timerId);
            timerId = null;
        }

        function runEx(name) {
            resetAllTimers();
            currentExName = name;
            const pool = heroes[currentGender];
            const hero = pool[Math.floor(Math.random() * pool.length)];
            const config = getExConfig()[name];
            
            document.getElementById('hero-img').src = hero.img;
            document.getElementById('action-coach-name').innerText = "教練：" + hero.name;
            document.getElementById('action-title').innerText = name;
            renderDailyTasks();

            const repsVal = typeof config.reps === 'number' ? config.reps + "下" : config.reps;
            const intro = `${hero.msg}。接下來是${name}，共${config.sets}組，每組${repsVal}。動作要領：${config.tips}`;
            speak(intro);
            
            workoutState = 'WORKING';
            setCounter = 1;
            // 給予足夠時間唸完旁白，然後強行數數
            setTimeout(() => startSetLoop(name), 8000);
        }

        function startSetLoop(name) {
            resetAllTimers();
            const config = getExConfig()[name];
            const setNames = ["", "第一組", "第二組", "第三組"];
            repCounter = 0;
            document.getElementById('display-val').innerText = "0";
            document.getElementById('timer-progress').style.stroke = "currentColor";
            
            // 1. "開始宣告"
            speak(`${setNames[setCounter] || "下一組"}，開始！`);

            // 2. 核心變更：數數開始前增加 1.5 秒延遲
            setTimeout(() => {
                if (name === "核心棒式" || name === "開合跳" || config.reps.toString().includes("秒")) {
                    let left = parseInt(config.reps);
                    timerId = setInterval(() => {
                        left--;
                        document.getElementById('display-val').innerText = left;
                        if (left <= 3 && left > 0) speak(left.toString());
                        if (left <= 0) { resetAllTimers(); finishSet(name); }
                    }, 1000);
                } else {
                    const countReps = () => {
                        if (workoutState !== 'WORKING') return;
                        if (repCounter < config.reps) {
                            repCounter++;
                            document.getElementById('display-val').innerText = repCounter;
                            speak(repCounter.toString());
                            timerId = setTimeout(countReps, pacingSeconds * 1000);
                        } else { resetAllTimers(); finishSet(name); }
                    };
                    countReps();
                }
            }, 1500); // 這裡是 1.5 秒延遲
        }

        function finishSet(name) {
            const config = getExConfig()[name];
            if (setCounter < config.sets) {
                workoutState = 'RESTING';
                let rest = 30;
                document.getElementById('display-val').innerText = rest;
                document.getElementById('timer-progress').style.stroke = "#10b981";
                
                const enc = encouragements[Math.floor(Math.random() * encouragements.length)];
                speak(`漂亮，休息三十秒。現在複習動作要領：${config.tips}。${enc}`);
                
                timerId = setInterval(() => {
                    rest--;
                    document.getElementById('display-val').innerText = rest;
                    if (rest <= 0) { 
                        resetAllTimers(); 
                        setCounter++; 
                        workoutState = 'WORKING'; 
                        startSetLoop(name); 
                    }
                }, 1000);
            } else {
                workoutState = 'IDLE';
                currentExName = null;
                renderDailyTasks();
                speak("這項任務完成了！朋友們，妳做得很棒，請點擊確認按鈕。");
            }
        }

        function confirmItem(name) {
            if (!sessionCompletedNames.includes(name)) sessionCompletedNames.push(name);
            renderDailyTasks();
            if (sessionCompletedNames.length === 4) {
                const h = JSON.parse(localStorage.getItem('vHist_ycy_2026_vFinal')) || [];
                const ds = new Date().toLocaleDateString();
                if (!h.includes(ds)) {
                    h.push(ds);
                    localStorage.setItem('vHist_ycy_2026_vFinal', JSON.stringify(h));
                    renderCalendar();
                    showPop();
                }
            }
        }

        function showPop() {
            const u = currentGender === 'male' ? '你' : '妳';
            const msg = `${u}完成了今日特訓！朋友們為${u}感到驕傲！By ycy 2026`;
            document.getElementById('reward-msg').innerText = msg;
            document.getElementById('reward-modal').classList.remove('hidden');
            speak(msg);
        }

        function renderDailyTasks() {
            const listEl = document.getElementById('daily-task-list');
            listEl.innerHTML = '';
            const todayNum = new Date().getDay();
            if (!mySchedule.includes(todayNum)) {
                document.getElementById('daily-goal-text').innerText = "今日為修復日，休息是為了走更長遠的路。";
                return;
            }
            document.getElementById('daily-goal-text').innerText = "今日目標：強化肌耐力，打造英雄體態。";
            const exList = currentGender === 'male' ? ["伏地挺身", "負重深蹲", "彈力繩划船", "核心棒式"] : ["勾腳尖蹬腿", "彈力繩胸推", "核心棒式", "二頭/三頭組合"];
            const config = getExConfig();
            exList.forEach(name => {
                const ex = config[name];
                const isDone = sessionCompletedNames.includes(name);
                const isActive = currentExName === name;
                const card = document.createElement('div');
                card.className = `glass p-8 rounded-[3rem] task-card ${isDone ? 'completed' : ''} ${isActive ? 'active-now' : ''}`;
                card.innerHTML = `<div class="flex justify-between items-start mb-6"><div><h4 class="font-black text-white text-2xl mb-1">${name}</h4><p class="text-base text-main font-bold uppercase tracking-widest">${ex.sets} 組 ∙ ${ex.reps}${typeof ex.reps === 'number' ? ' 下' : ''}</p></div><button onclick="runEx('${name}')" class="bg-slate-700 text-white text-xs font-black px-6 py-3 rounded-full active:scale-90">開始訓練</button></div><p class="text-base text-slate-300 mb-8 leading-relaxed italic">動作要領：${ex.tips}</p><button onclick="confirmItem('${name}')" class="w-full py-5 rounded-[2rem] border border-slate-700 text-base font-black uppercase ${isDone ? 'bg-emerald-500 text-white border-none' : 'text-slate-500'}">${isDone ? '✅ 任務已達成' : '點擊確認完成'}</button>`;
                listEl.appendChild(card);
            });
        }

        function renderCalendar() {
            const now = new Date();
            const history = JSON.parse(localStorage.getItem('vHist_ycy_2026_vFinal')) || [];
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const total = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const offset = first === 0 ? 6 : first - 1;
            for (let i = 0; i < offset; i++) container.innerHTML += '<div></div>';
            for (let d = 1; d <= total; d++) {
                const dateObj = new Date(now.getFullYear(), now.getMonth(), d);
                const ds = dateObj.toLocaleDateString();
                container.innerHTML += `<div class="calendar-day ${ds === new Date().toLocaleDateString() ? 'today-mark' : ''} ${mySchedule.includes(dateObj.getDay()) ? 'workout-day' : ''} ${history.includes(ds) ? 'done-history' : ''}">${d}</div>`;
            }
        }

        function selectDay(d) {
            const idx = mySchedule.indexOf(d);
            if (idx > -1) mySchedule.splice(idx, 1);
            else if (mySchedule.length < 4) mySchedule.push(d);
            document.querySelectorAll('.day-btn').forEach(btn => btn.className = mySchedule.includes(parseInt(btn.dataset.day)) ? 'day-btn active' : 'day-btn');
        }

        function confirmSchedule() {
            localStorage.setItem('vSch_ycy_2026_final_v4', JSON.stringify(mySchedule));
            renderCalendar(); renderDailyTasks(); speak("日程已更新！");
        }

        function resetSchedule() {
            mySchedule = []; localStorage.removeItem('vSch_ycy_2026_final_v4');
            document.querySelectorAll('.day-btn').forEach(btn => btn.className = 'day-btn');
            renderCalendar(); renderDailyTasks();
        }

        function toggleGender() {
            currentGender = currentGender === 'male' ? 'female' : 'male';
            document.getElementById('app-body').className = 'pb-20 theme-' + currentGender;
            document.getElementById('gender-btn').innerText = `切換模式 (目前:${currentGender === 'male' ? '男' : '女'}性)`;
            sessionCompletedNames = [];
            document.querySelectorAll('.coach-pronoun').forEach(el => el.innerText = currentGender === 'male' ? '你' : '妳');
            renderCalendar(); renderDailyTasks();
        }

        function updatePacing(val) { pacingSeconds = parseFloat(val); document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s"; }
        function toggleVoice() { isVoiceOn = !isVoiceOn; document.getElementById('voice-toggle').innerText = isVoiceOn ? '🔊' : '🔇'; }
        function closeModal() { document.getElementById('reward-modal').classList.add('hidden'); }

        window.onload = () => {
            document.querySelectorAll('.day-btn').forEach(btn => {
                btn.onclick = () => selectDay(parseInt(btn.dataset.day));
                if (mySchedule.includes(parseInt(btn.dataset.day))) btn.classList.add('active');
            });
            renderCalendar(); renderDailyTasks();
        };
    </script>
</body>
</html>
