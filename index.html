<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VitalityPro by ycy</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f8fafc; -webkit-tap-highlight-color: transparent; transition: background 0.5s; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* 性別主題顏色：淡粉紅優化 */
        .theme-male { --main: #3b82f6; --accent: #1d4ed8; }
        .theme-female { --main: #f472b6; --accent: #db2777; }
        
        .bg-main { background-color: var(--main); }
        .text-main { color: var(--main); }
        .border-main { border-color: var(--main); }
        
        .today-mark { background: #ef4444 !important; color: white !important; border-radius: 50%; font-weight: 900; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
        .workout-day { border: 2px solid var(--main); border-radius: 50%; }
        
        .calendar-day { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; position: relative; color: #475569; font-size: 13px; }
        .done-history::after { content: '⭐'; position: absolute; bottom: -2px; right: -2px; font-size: 10px; color: #f59e0b; }
        
        .progress-ring { transition: stroke-dashoffset 0.3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .task-card { border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s; }
        .task-card.completed { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }

        input[type=range] { -webkit-appearance: none; background: #1e293b; height: 8px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; background: var(--main); cursor: pointer; }
    </style>
</head>
<body class="pb-20 theme-male" id="app-body">

    <div class="max-w-md mx-auto px-6 py-6">
        
        <header class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-black tracking-tighter italic text-white">
                    Vitality<span class="text-main">PRO</span><span class="text-sm font-normal text-slate-500 not-italic ml-2">by ycy</span>
                </h1>
                <button onclick="toggleVoice()" id="voice-toggle" class="bg-slate-800 p-2 rounded-xl border border-slate-700 text-2xl shadow-lg">🔊</button>
            </div>
            
            <div class="space-y-4">
                <button onclick="toggleGender()" id="gender-btn" class="w-full py-4 rounded-2xl bg-main text-sm font-black text-white shadow-lg uppercase tracking-widest active:scale-95 transition-all">
                    切換模式 (目前:男性)
                </button>
                <div class="glass p-5 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest italic">⚡️ 動作節奏 (秒/次)</span>
                        <span id="pacing-val" class="text-lg font-black text-main">2.0s</span>
                    </div>
                    <input type="range" id="pacing-slider" min="2" max="5" step="0.5" value="2" class="w-full" oninput="updatePacing(this.value)">
                </div>
            </div>
        </header>

        <div class="bg-slate-800/40 border border-slate-700 rounded-2xl p-5 mb-6">
            <h4 class="text-xs font-black text-main uppercase tracking-widest mb-2">今天的目標</h4>
            <p id="daily-goal-text" class="text-sm text-slate-200 font-medium leading-relaxed italic">準備開始特訓...</p>
        </div>

        <section class="glass rounded-[1.5rem] p-4 shadow-2xl mb-8 text-center">
            <p class="text-[10px] text-slate-500 mb-3 uppercase font-bold tracking-widest">圈號為運動日 ∙ 僅限當日完成</p>
            <div id="calendar-days" class="grid grid-cols-7 gap-2 font-bold"></div>
        </section>

        <section class="bg-slate-800/30 rounded-[3rem] p-8 text-white shadow-2xl relative border border-slate-700/50 mb-10 text-center">
            <p class="text-xs font-black text-main uppercase tracking-widest mb-3">
                <span class="coach-pronoun">你</span>今天的教練
            </p>
            <div id="hero-emoji" class="text-7xl mb-6 h-20 flex items-center justify-center">🦸‍♂️</div>
            
            <div class="flex flex-col items-center">
                <div class="relative mb-6">
                    <svg width="130" height="130">
                        <circle cx="65" cy="65" r="60" stroke="#1e293b" stroke-width="7" fill="transparent" />
                        <circle id="timer-progress" cx="65" cy="65" r="60" stroke="currentColor" stroke-width="7" fill="transparent" stroke-dasharray="377" stroke-dashoffset="0" stroke-linecap="round" class="progress-ring text-main" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="display-val" class="text-6xl font-black italic tracking-tighter">--</span>
                    </div>
                </div>
                <h3 id="action-title" class="text-xl font-black mb-1 text-white uppercase italic">Avengers Assemble</h3>
                <p id="action-coach-name" class="text-sm text-slate-400 italic">點擊動作開始任務</p>
            </div>
        </section>

        <div id="daily-task-list" class="space-y-6 mb-12"></div>

        <div class="flex justify-center gap-10 py-8 border-t border-slate-800" id="badge-row">
            <div id="badge-5" class="opacity-10 grayscale text-5xl transition-all duration-1000">🥉</div>
            <div id="badge-10" class="opacity-10 grayscale text-5xl transition-all duration-1000">🥈</div>
            <div id="badge-15" class="opacity-10 grayscale text-5xl transition-all duration-1000">🥇</div>
        </div>
    </div>

    <div id="reward-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-xl">
        <div class="bg-slate-900 border border-slate-700 rounded-[3.5rem] p-10 text-center max-w-sm w-full">
            <div class="text-8xl mb-6">🏆</div>
            <h2 class="text-3xl font-black text-white mb-4 italic">任務全達成！</h2>
            <p id="reward-msg" class="text-base text-slate-300 mb-8 leading-relaxed"></p>
            <button onclick="closeModal()" class="w-full bg-main text-white font-black py-4 rounded-2xl shadow-xl text-lg">繼續變強</button>
        </div>
    </div>

    <script>
        let currentGender = 'male';
        let isVoiceOn = true;
        let workoutState = 'IDLE'; 
        let currentEx = null;
        let setCounter = 1;
        let repCounter = 0;
        let timerInterval;
        let pacingSeconds = 2.0;
        let sessionCompletedNames = [];

        const schedule = {
            2: { name: "胸背力量日", goal: "今日目標：強化上半身推拉，雕塑挺拔身形。", exercises: ["伏地挺身", "彈力繩划船", "彈力繩胸推"] },
            4: { name: "下肢護膝日", goal: "今日目標：增加腿部深層肌力，走路穩健有力。", exercises: ["負重深蹲", "彈力繩死硬舉", "勾腳尖蹬腿"] },
            6: { name: "核心心肺日", goal: "今日目標：啟動全身代謝，燃燒內臟脂肪。", exercises: ["核心棒式", "開合跳", "二頭/三頭組合"] },
            0: { name: "全身大挑戰", goal: "今日目標：全面體能重啟，重返巔峰活力。", exercises: ["伏地挺身", "負重深蹲", "彈力繩划船", "核心棒式"] }
        };

        const allExercises = {
            "伏地挺身": { sets: 3, reps: 12, tips: "雙手寬於肩，胸貼地後呼氣推起，背部平直。" },
            "核心棒式": { sets: 3, reps: "40秒", tips: "手肘撐地腹部縮，全身成一線，不憋氣。" },
            "負重深蹲": { sets: 3, reps: 12, tips: "重心在腳跟，屁股向後坐如坐椅子。" },
            "開合跳": { sets: 3, reps: "30秒", tips: "輕盈彈跳，腳尖著地緩衝，手要擊掌。" },
            "彈力繩划船": { sets: 3, reps: 12, tips: "挺胸夾緊背部，將帶子拉至腹部兩側。" },
            "彈力繩死硬舉": { sets: 3, reps: 12, tips: "背挺直由臀部發力站起，感受大腿後側。" },
            "二頭/三頭組合": { sets: 3, reps: 12, tips: "手肘固定不動，感受手臂肌肉緩慢收縮。" },
            "勾腳尖蹬腿": { sets: 3, reps: 15, tips: "用力勾起腳尖，腿部完全伸直，保護膝蓋。" },
            "彈力繩胸推": { sets: 3, reps: 12, tips: "帶子繞過背部，手向前推直，胸肌發力。" }
        };

        const heroes = [
            { name: "美國隊長", emoji: "🛡️", m: "我能跟你耗上一整天！動起來！", f: "我能跟妳耗上一整天！動起來！" },
            { name: "鋼鐵人", emoji: "🚀", m: "我愛你三千次，給我推起來！", f: "我愛妳三千次，給我推起來！" },
            { name: "驚奇隊長", emoji: "⭐", m: "更高更快更強！超越極限吧！", f: "更高更快更強！超越極限吧！" },
            { name: "黑寡婦", emoji: "🕷️", m: "疼痛只是訊號。肌肉是永恆的。開始。", f: "疼痛只是訊號。肌肉是永恆的。開始。" }
        ];

        function speak(text, callback) {
            if (!isVoiceOn) { if(callback) callback(); return; }
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            let done = false;
            const timer = setTimeout(() => { if(!done){ done=true; if(callback) callback(); } }, 6000);
            msg.onend = () => { if(!done){ done=true; clearTimeout(timer); if(callback) callback(); } };
            window.speechSynthesis.speak(msg);
        }

        function initApp() {
            renderCalendar();
            renderDailyTasks();
            updateUIStrings();
            updateBadges();
        }

        function updateUIStrings() {
            const u = (currentGender === 'male') ? '你' : '妳';
            document.querySelectorAll('.coach-pronoun').forEach(el => el.innerText = u);
        }

        function renderCalendar() {
            const now = new Date();
            const history = JSON.parse(localStorage.getItem('vH_ycy_read_v1') || "[]");
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';
            const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
            const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

            for (let i = 0; i < first; i++) container.innerHTML += '<div></div>';
            for (let d = 1; d <= days; d++) {
                const ds = new Date(now.getFullYear(), now.getMonth(), d).toLocaleDateString();
                const isToday = ds === new Date().toLocaleDateString();
                const isDone = history.includes(ds);
                const isScheduled = [0,2,4,6].includes(new Date(now.getFullYear(), now.getMonth(), d).getDay());
                container.innerHTML += `<div class="calendar-day ${isToday ? 'today-mark' : ''} ${isScheduled ? 'workout-day' : ''} ${isDone ? 'done-history' : ''}">${d}</div>`;
            }
        }

        function renderDailyTasks() {
            const day = new Date().getDay();
            const taskInfo = schedule[day] || { name: "修復日", goal: "適當休息是為了走更長遠的路。", exercises: [] };
            document.getElementById('daily-goal-text').innerText = taskInfo.goal;
            const listEl = document.getElementById('daily-task-list');
            listEl.innerHTML = '';
            
            taskInfo.exercises.forEach(name => {
                const ex = allExercises[name];
                const isDone = sessionCompletedNames.includes(name);
                const card = document.createElement('div');
                card.className = `glass p-6 rounded-[2.5rem] task-card ${isDone ? 'completed' : ''}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="font-black text-white text-xl">${name}</h4>
                            <p class="text-sm text-main font-bold uppercase tracking-wider">${ex.sets} 組 ∙ ${ex.reps}</p>
                        </div>
                        <button onclick="runEx('${name}')" class="bg-slate-700 text-white text-xs font-black px-5 py-2 rounded-full uppercase">開始訓練</button>
                    </div>
                    <p class="text-sm text-slate-300 mb-6 leading-relaxed">動作要領：${ex.tips}</p>
                    <button onclick="confirmItem('${name}')" class="w-full py-4 rounded-2xl border border-slate-700 text-sm font-black uppercase ${isDone ? 'bg-emerald-500 text-white border-none' : 'text-slate-500'}">
                        ${isDone ? '✅ 任務已達成' : '點擊確認完成此項'}
                    </button>
                `;
                listEl.appendChild(card);
            });
        }

        function runEx(name) {
            if(workoutState !== 'IDLE') return;
            const hero = heroes[Math.floor(Math.random() * heroes.length)];
            const ex = allExercises[name];
            document.getElementById('hero-emoji').innerText = hero.emoji;
            document.getElementById('action-coach-name').innerText = "教練：" + hero.name;
            document.getElementById('action-title').innerText = name;
            
            speak(currentGender === 'male' ? hero.m : hero.f, () => {
                workoutState = 'WORKING'; setCounter = 1; startSet(name);
            });
        }

        function startSet(name) {
            const ex = allExercises[name];
            repCounter = 0;
            document.getElementById('display-val').innerText = "0";
            speak(`第 ${setCounter} 組，開始！`, () => {
                if(typeof ex.reps === 'number') countReps(ex.reps, name);
                else countTime(parseInt(ex.reps), name);
            });
        }

        function countReps(max, name) {
            if (repCounter < max) {
                repCounter++; document.getElementById('display-val').innerText = repCounter;
                speak(`${repCounter}`);
                timerInterval = setTimeout(() => countReps(max, name), pacingSeconds * 1000);
            } else { nextStep(name); }
        }

        function countTime(sec, name) {
            let l = sec;
            timerInterval = setInterval(() => {
                l--; document.getElementById('display-val').innerText = l;
                if(l <= 3 && l > 0) speak(`${l}`);
                if(l <= 0) { clearInterval(timerInterval); nextStep(name); }
            }, 1000);
        }

        function nextStep(name) {
            const ex = allExercises[name];
            if (setCounter < ex.sets) {
                workoutState = 'RESTING'; let r = 30;
                document.getElementById('display-val').innerText = r;
                document.getElementById('timer-progress').style.stroke = "#10b981";
                speak("休息三十秒。");
                timerInterval = setInterval(() => {
                    r--; document.getElementById('display-val').innerText = r;
                    if(r <= 0) { 
                        clearInterval(timerInterval); setCounter++; 
                        document.getElementById('timer-progress').style.stroke = "currentColor";
                        startSet(name); 
                    }
                }, 1000);
            } else {
                workoutState = 'IDLE'; speak("這項完成了！記得按確認按鈕。");
            }
        }

        function confirmItem(name) {
            if(!sessionCompletedNames.includes(name)) sessionCompletedNames.push(name);
            renderDailyTasks();
            const total = (schedule[new Date().getDay()] || {exercises:[]}).exercises.length;
            if(sessionCompletedNames.length === total && total > 0) {
                const h = JSON.parse(localStorage.getItem('vH_ycy_read_v1') || "[]");
                const ds = new Date().toLocaleDateString();
                if(!h.includes(ds)) {
                    h.push(ds); localStorage.setItem('vH_ycy_read_v1', JSON.stringify(h));
                    renderCalendar(); updateBadges(); showPop();
                }
            }
        }

        function showPop() {
            const u = (currentGender === 'male') ? '你' : '妳';
            const history = JSON.parse(localStorage.getItem('vH_ycy_read_v1') || "[]");
            let msg = `${u}太棒了！完成了今日特訓，英雄之血在${u}體內沸騰！`;
            if(history.length >= 5) msg = `恭喜 5 天達成！${u}像登山客一樣強壯了！`;
            if(history.length >= 15) msg = `${u}就是傳奇復仇者！15 天全勤達成！By ycy`;
            
            document.getElementById('reward-msg').innerText = msg;
            document.getElementById('reward-modal').classList.remove('hidden');
            speak(msg);
        }

        function updateBadges() {
            const count = JSON.parse(localStorage.getItem('vH_ycy_read_v1') || "[]").length;
            if(count >= 5) document.getElementById('badge-5').classList.remove('opacity-10', 'grayscale');
            if(count >= 10) document.getElementById('badge-10').classList.remove('opacity-10', 'grayscale');
            if(count >= 15) document.getElementById('badge-15').classList.remove('opacity-10', 'grayscale');
        }

        function toggleGender() {
            currentGender = currentGender === 'male' ? 'female' : 'male';
            document.getElementById('app-body').className = 'pb-20 theme-' + currentGender;
            document.getElementById('gender-btn').innerText = `切換模式 (目前:${currentGender==='male'?'男':'女'}性)`;
            sessionCompletedNames = [];
            initApp();
        }

        function updatePacing(val) { pacingSeconds = parseFloat(val); document.getElementById('pacing-val').innerText = pacingSeconds.toFixed(1) + "s"; }
        function toggleVoice() { isVoiceOn = !isVoiceOn; document.getElementById('voice-toggle').innerText = isVoiceOn ? '🔊' : '🔇'; }
        function closeModal() { document.getElementById('reward-modal').classList.add('hidden'); }
        function clearHistory() { if(confirm("重置數據？")) { localStorage.clear(); location.reload(); } }

        window.onload = initApp;
    </script>
</body>
</html>
