<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitality Pro 55+ | 泰森戰魂最終版</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3843/3843032.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        .today-active { 
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%) !important; 
            color: white !important; 
            font-weight: 900; 
            border-radius: 50%; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); 
            transform: scale(1.15); 
            z-index: 10; 
        }

        .calendar-day { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; position: relative; color: #64748b; font-size: 12px; }
        .done-check::after { content: '🔥'; position: absolute; bottom: -2px; right: -2px; font-size: 10px; }
        .progress-ring { transition: stroke-dashoffset 0.3s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .active-card { border: 2px solid #ef4444; background-color: rgba(239, 68, 68, 0.2); }
        .exercise-gif { width: 100%; height: 180px; object-fit: contain; border-radius: 2rem; background: #1e293b; padding: 15px; }
        
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        .shake-timer { animation: shake 0.5s infinite; color: #ef4444 !important; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-md mx-auto px-6 py-4">
        
        <header class="mb-6">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-3xl font-black tracking-tighter text-white">Vitality<span class="text-red-500">PRO</span></h1>
                <div class="flex gap-2">
                    <button onclick="toggleVoice()" id="voice-toggle" class="bg-slate-800 p-2 rounded-xl border border-slate-700 text-lg">🔊</button>
                </div>
            </div>
            <button onclick="toggleGender()" id="gender-toggle" class="w-full py-3 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-700 text-xs font-black text-white shadow-lg shadow-blue-900/40 uppercase tracking-widest active:scale-95 transition-all">
                切換至女性訓練模式
            </button>
        </header>

        <section class="glass rounded-[2rem] p-4 shadow-2xl mb-6">
            <div id="calendar-days" class="grid grid-cols-7 gap-1 text-center text-sm font-bold">
                </div>
        </section>

        <section class="bg-slate-800/50 rounded-[2.5rem] p-6 text-white shadow-2xl relative border border-slate-700/50 mb-6 text-center">
            <div class="mb-4 flex justify-center">
                <img id="exercise-img" src="https://cdn-icons-png.flaticon.com/512/3843/3843032.png" class="exercise-gif" alt="動作示範">
            </div>

            <div class="flex flex-col items-center">
                <div class="relative mb-4">
                    <svg width="120" height="120">
                        <circle cx="60" cy="60" r="54" stroke="#334155" stroke-width="6" fill="transparent" />
                        <circle id="timer-progress" cx="60" cy="60" r="54" stroke="#ef4444" stroke-width="6" fill="transparent" stroke-dasharray="340" stroke-dashoffset="0" stroke-linecap="round" class="progress-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="timer-val" class="text-4xl font-black italic tracking-tighter">00</span>
                        <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">Beat</span>
                    </div>
                </div>

                <h3 id="action-title" class="text-lg font-black mb-1 text-red-500 uppercase tracking-tight">等待戰鬥</h3>
                <div class="bg-slate-900/80 rounded-xl p-3 w-full border border-slate-700">
                    <p id="action-guide" class="text-[10px] text-slate-400 leading-relaxed font-medium">
                        「跟著我的節奏：一、二、三、四！」
                    </p>
                </div>
            </div>
        </section>

        <div class="space-y-6">
            <div class="grid grid-cols-2 gap-3" id="base-list"></div>
            <div class="grid grid-cols-1 gap-3" id="band-list"></div>
        </div>

        <div class="mt-10 flex flex-col items-center gap-4">
            <div id="badge-row" class="flex gap-6 mb-2">
                <div id="b5" class="text-3xl grayscale opacity-20">🥉</div>
                <div id="b10" class="text-3xl grayscale opacity-20">🥈</div>
                <div id="b15" class="text-3xl grayscale opacity-20">🥇</div>
            </div>
            <button onclick="clearHistory()" class="text-[10px] text-slate-500 underline uppercase">重置紀錄</button>
        </div>
    </div>

    <div id="reward-modal" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-8 backdrop-blur-xl">
        <div class="bg-slate-900 border border-red-500/30 rounded-[3rem] p-8 text-center max-w-sm w-full shadow-2xl">
            <div id="reward-icon" class="text-7xl mb-4">🏆</div>
            <h2 id="reward-title" class="text-2xl font-black text-white mb-2">榮耀覺醒</h2>
            <p id="reward-desc" class="text-slate-400 mb-6 leading-relaxed text-xs font-medium"></p>
            <button onclick="closeModal()" class="w-full bg-red-600 text-white font-black py-3 rounded-xl shadow-lg">繼續變強</button>
        </div>
    </div>

    <script>
        let currentGender = 'male';
        let countdown;
        let isVoiceOn = true;

        const milestones = {
            5: { title: "【銅級：登山客】", desc: "戰友！你現在可以踏平象山！雙腿已經覺醒了！", icon: "🥉" },
            10: { title: "【銀級：大力士】", desc: "咆哮吧！你現在可以單手舉起一頭小牛！這就是力量！", icon: "🥈" },
            15: { title: "【金級：不老泰森】", desc: "巔峰！你壯得跟泰森一樣！重回30歲體能！", icon: "🥇" }
        };

        const exercises = {
            male: {
                base: [
                    { name: "伏地挺身", sec: 45, icon: "💪", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXJreW90bWxsbm9hZDNvNHRrMmdsZTR6bjZnd3ZscDR6NHZsayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKpxv42I89mQJLW/giphy.gif", speech: "伏地挺身！撐起來！泰森在看著你！", guide: "背部平直，胸部貼地後推起。" },
                    { name: "核心棒式", sec: 60, icon: "🧘", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZhcHoxZ3Z0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKSj0q942H2e5tS/giphy.gif", speech: "棒式！鎖死你的核心！不准掉下去！", guide: "手肘撐地，身體呈直線，核心收緊。" },
                    { name: "負重深蹲", sec: 45, icon: "🦵", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZhcHoxZ3Z0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKv6eSqcE2C6Iyk/giphy.gif", speech: "深蹲！像大樹一樣穩！站起來！", guide: "重心在腳跟，背挺直，屁股後坐。" },
                    { name: "開合跳", sec: 45, icon: "🏃", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXJreW90bWxsbm9hZDNvNHRrMmdsZTR6bjZnd3ZscDR6NHZsayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKpxv42I89mQJLW/giphy.gif", speech: "開合跳！燃燒吧心肺！跟上節奏！", guide: "保持輕盈跳動，膝蓋微彎緩衝。" }
                ],
                band: [
                    { name: "彈力繩划船", sec: 45, icon: "🛶", img: "https://cdn-icons-png.flaticon.com/512/3843/3843015.png", speech: "彈力繩划船！背肌夾緊！拉動你的命運！", guide: "帶子繞過腳底，背部夾緊往後拉。" },
                    { name: "彈力繩死硬舉", sec: 45, icon: "🏋️", img: "https://cdn-icons-png.flaticon.com/512/3843/3843022.png", speech: "死硬舉！地心引力踩在腳下！用力！", guide: "雙腳踩帶，背挺，髖部發力向上。" }
                ]
            },
            female: {
                base: [
                    { name: "跪姿伏地", sec: 45, icon: "🌸", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXJreW90bWxsbm9hZDNvNHRrMmdsZTR6bjZnd3ZscDR6NHZsayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7TKpxv42I89mQJLW/giphy.gif", speech: "跪姿伏地！你是最有力量的女性！推起來！", guide: "膝蓋著地，手臂慢下慢上。" },
                    { name: "扶椅深蹲", sec: 45, icon: "🪑", img: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3ZhcHoxZ3Z0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0Z3p0JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKv6eSqcE2C6Iyk/giphy.gif", speech: "扶椅深蹲！強健雙腿，保護膝蓋！每一蹲都是健康！", guide: "扶住椅背，下蹲再站起。" }
                ],
                band: [
                    { name: "勾腳尖蹬腿", sec: 60, icon: "🛡️", img: "https://cdn-icons-png.flaticon.com/512/3843/3843032.png", speech: "守護膝蓋！用力勾起腳尖！蹬出去！", guide: "坐姿下勾腳伸直腿，強化股四頭肌。" }
                ]
            }
        };

        function initApp() {
            renderCalendar(); renderExercises(); updateBadges();
        }

        function speak(text) {
            if (!isVoiceOn) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW'; msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        function toggleVoice() {
            isVoiceOn = !isVoiceOn;
            document.getElementById('voice-toggle').innerText = isVoiceOn ? '🔊' : '🔇';
        }

        function renderCalendar() {
            const now = new Date(); const history = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const container = document.getElementById('calendar-days'); container.innerHTML = '';
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();

            for (let i = 0; i < firstDay; i++) container.innerHTML += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = new Date(now.getFullYear(), now.getMonth(), d).toLocaleDateString();
                const isToday = dateStr === new Date().toLocaleDateString();
                const isDone = history.includes(dateStr);
                container.innerHTML += `<div class="calendar-day ${isToday ? 'today-active' : ''} ${isDone ? 'done-check' : ''}">${d}</div>`;
            }
        }

        function renderExercises() {
            const baseList = document.getElementById('base-list'); const bandList = document.getElementById('band-list');
            baseList.innerHTML = ''; bandList.innerHTML = '';
            const data = exercises[currentGender];

            data.base.forEach(ex => {
                const card = document.createElement('button');
                card.className = "glass p-6 rounded-[2rem] flex flex-col items-center transition-all active:scale-95";
                card.onclick = () => startTimer(ex, card);
                card.innerHTML = `<div class="text-3xl mb-1">${ex.icon}</div><div class="text-[10px] font-black text-slate-400 uppercase">${ex.name}</div>`;
                baseList.appendChild(card);
            });

            data.band.forEach(ex => {
                const card = document.createElement('button');
                card.className = "glass p-4 rounded-2xl flex justify-between items-center px-6 transition-all active:scale-95";
                card.onclick = () => startTimer(ex, card);
                card.innerHTML = `<div class="flex items-center gap-3"><span class="text-2xl">${ex.icon}</span><span class="text-sm font-black text-white">${ex.name}</span></div><span class="text-[9px] font-bold text-red-500">BANDS</span>`;
                bandList.appendChild(card);
            });
        }

        function startTimer(ex, el) {
            clearInterval(countdown);
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-card'));
            el.classList.add('active-card');
            document.getElementById('action-title').innerText = ex.name;
            document.getElementById('action-guide').innerText = ex.guide;
            document.getElementById('exercise-img').src = ex.img;
            
            speak(ex.speech);

            let left = ex.sec; 
            const timerEl = document.getElementById('timer-val');
            
            countdown = setInterval(() => {
                left--; timerEl.innerText = left;
                document.getElementById('timer-progress').style.strokeDashoffset = 340 - (left / ex.sec) * 340;

                // --- 新增：數數提示音 (每 4 秒一個循環) ---
                if (left > 3) {
                    const countInCycle = (ex.sec - left) % 4;
                    if (countInCycle === 1) speak("一");
                    if (countInCycle === 2) speak("二");
                    if (countInCycle === 3) speak("三");
                    if (countInCycle === 0) speak("四");
                }

                if (left === 3) { timerEl.classList.add('shake-timer'); speak("三、二、一！撐住！"); }
                
                if (left <= 0) {
                    clearInterval(countdown); timerEl.classList.remove('shake-timer');
                    saveRecord(); speak("完成！你是真正的傳奇！");
                }
            }, 1000);
        }

        function saveRecord() {
            const history = JSON.parse(localStorage.getItem('workoutHistory') || "[]");
            const today = new Date().toLocaleDateString();
            if (!history.includes(today)) {
                history.push(today); localStorage.setItem('workoutHistory', JSON.stringify(history));
                renderCalendar(); updateBadges();
                if (milestones[history.length]) showReward(milestones[history.length]);
            }
        }

        function updateBadges() {
            const count = JSON.parse(localStorage.getItem('workoutHistory') || "[]").length;
            if (count >= 5) document.getElementById('b5').classList.remove('grayscale', 'opacity-20');
            if (count >= 10) document.getElementById('b10').classList.remove('grayscale', 'opacity-20');
            if (count >= 15) document.getElementById('b15').classList.remove('grayscale', 'opacity-20');
        }

        function showReward(m) {
            document.getElementById('reward-icon').innerText = m.icon;
            document.getElementById('reward-title').innerText = "戰魂覺醒！";
            document.getElementById('reward-desc').innerHTML = m.desc;
            document.getElementById('reward-modal').classList.remove('hidden');
            speak(`榮耀時刻！解鎖稱號：${m.title}！`);
        }

        function closeModal() { document.getElementById('reward-modal').classList.add('hidden'); }
        
        function toggleGender() {
            currentGender = currentGender === 'male' ? 'female' : 'male';
            document.getElementById('gender-toggle').innerText = `切換至${currentGender === 'male' ? '女' : '男'}性訓練模式`;
            renderExercises();
        }

        initApp();
    </script>
</body>
</html>
